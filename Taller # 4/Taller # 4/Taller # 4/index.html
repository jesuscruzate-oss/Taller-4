<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu principal</title>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
            text-align: center;
            width: 400px;
        }

        h1 {
            margin-bottom: 30px;
            color: #1e3c72;
        }

        a {
            display: block;
            text-decoration: none;
            background: #2a5298;
            color: white;
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            transition: 0.3s;
        }

        a:hover {
            background: #1e3c72;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Menú Principal</h1>

        <a href="ejercicio1.html">Ir al Ejercicio 1</a>
        <a href="ejercicio2.html">Ir al Ejercicio 2</a>
        <a href="ejercicio3.html">Ir al Ejercicio 3</a>
    </div>

</body>
</html>
